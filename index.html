<!DOCTYPE html>
<html lang="id" class="overflow-hidden">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio | Digital Innovator</title>
    <!-- SEO & Link Preview Meta Tags -->
    <meta name="description"
        content="Portofolio resmi Fajar Ramadhani. Membangun ekosistem digital yang modern melalui integrasi Artificial Intelligence dan teknologi web masa kini.">
    <meta property="og:title" content="Portfolio | Digital Innovator">
    <meta property="og:description"
        content="Lihat portofolio, project AI, dan inovasi digital terbaru.">
    <meta property="og:image" content="./images/foto.png">
    <meta property="og:type" content="website">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./images/favicon.svg">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        cream: {
                            bg: '#FAF8F5',
                            card: '#FFFFFF',
                            border: '#E8E1D5',
                            accent: '#A58763',
                            dark: '#2D2D2D',
                            muted: '#736B5E',
                            light: '#D6C8AD'
                        }
                    }
                }
            }
        }
    </script>
    <script>
        // Prevent FOUC
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        .cursor-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Background Beams Effect (Fixed Global) */
        @keyframes fall {
            0% { transform: translateY(-150px); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        .beam {
            position: absolute;
            top: -150px;
            width: 1px;
            height: 250px;
            background: linear-gradient(to bottom, transparent, rgba(165, 135, 99, 0.8), transparent);
            animation: fall linear infinite;
            filter: drop-shadow(0 0 8px rgba(165, 135, 99, 0.6));
        }
        .beam:nth-child(1) { left: 15%; animation-duration: 6s; animation-delay: 0s; }
        .beam:nth-child(2) { left: 35%; animation-duration: 8s; animation-delay: 2.5s; }
        .beam:nth-child(3) { left: 50%; animation-duration: 7s; animation-delay: 1s; }
        .beam:nth-child(4) { left: 75%; animation-duration: 9s; animation-delay: 4s; }
        .beam:nth-child(5) { left: 85%; animation-duration: 6.5s; animation-delay: 1.5s; }

        /* Page Loader */
        .page-loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #FAF8F5;
            z-index: 99999;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dark .page-loader { background-color: #09090b; }
        .page-loader.hidden-loader {
            opacity: 0;
            visibility: hidden;
        }
        .loader-circle {
            width: 40px; height: 40px;
            border: 4px solid #A58763;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body
    class="bg-cream-bg dark:bg-zinc-950 text-cream-dark dark:text-cream-bg font-sans antialiased selection:bg-cream-accent selection:text-white relative overflow-hidden transition-colors duration-300 w-screen h-screen">

    <!-- Page Loader -->
    <div id="page-loader" class="page-loader">
        <div class="loader-circle"></div>
    </div>

    <!-- BACKGROUND BEAMS GLOBAL -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0 opacity-40 dark:opacity-70">
        <div class="beam"></div>
        <div class="beam"></div>
        <div class="beam"></div>
        <div class="beam"></div>
        <div class="beam"></div>
    </div>

    <!-- Header / Navbar -->
    <header
        class="fixed top-0 w-full bg-transparent z-50 transition-all">
        <div class="max-w-5xl mx-auto px-6 h-24 flex items-center justify-between">
            <a href="index.html"
                class="text-cream-dark dark:text-cream-bg font-extrabold text-xl tracking-tighter flex items-center gap-2">
                <i class="ph-fill ph-code-block text-cream-accent"></i>
                Portfolio<span class="text-cream-accent">.</span>
            </a>
            <nav class="hidden md:flex gap-8 text-sm font-semibold text-cream-muted dark:text-zinc-400">
                <a href="index.html" class="text-cream-dark dark:text-cream-bg transition-colors">Home</a>
                <a href="about.html" class="hover:text-cream-dark dark:hover:text-cream-bg transition-colors">About</a>
                <a href="projects.html" class="hover:text-cream-dark dark:hover:text-cream-bg transition-colors">Projects</a>
                <a href="contact.html" class="hover:text-cream-dark dark:hover:text-cream-bg transition-colors">Contact</a>
            </nav>
            <div class="flex items-center gap-4">
                <!-- Theme Toggle Button -->
                <button id="theme-toggle" type="button"
                    class="text-cream-muted dark:text-zinc-400 hover:text-cream-accent dark:hover:text-cream-accent text-2xl p-1 transition-colors">
                    <i id="theme-toggle-dark-icon" class="hidden ph-fill ph-moon"></i>
                    <i id="theme-toggle-light-icon" class="hidden ph-fill ph-sun"></i>
                </button>
                <!-- Hamburger Button (Mobile Only) -->
                <button id="mobile-menu-btn"
                    class="md:hidden text-cream-dark dark:text-cream-bg p-2 focus:outline-none">
                    <i id="mobile-menu-icon" class="ph-bold ph-list text-3xl"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Menu Dropdown -->
    <div id="mobile-menu"
        class="fixed top-24 left-0 w-full bg-cream-bg/95 dark:bg-zinc-950/95 backdrop-blur-md border-b border-cream-border dark:border-white/10 z-40 opacity-0 invisible transition-all duration-300 transform -translate-y-4">
        <nav class="flex flex-col p-6 gap-6 text-center font-bold text-cream-dark dark:text-cream-bg">
            <a href="index.html" class="mobile-link text-lg text-cream-accent">Home</a>
            <a href="about.html" class="mobile-link text-lg hover:text-cream-accent">About</a>
            <a href="projects.html" class="mobile-link text-lg hover:text-cream-accent">Projects</a>
            <a href="contact.html" class="mobile-link text-lg hover:text-cream-accent">Contact</a>
        </nav>
    </div>

    <!-- MAIN HERO CONTENT (Full Screen No Scroll) -->
    <main class="relative z-10 w-full h-full flex flex-col items-center justify-center text-center px-6 pt-16">
        
        <!-- Ambient Background Glow -->
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl h-[500px] opacity-20 pointer-events-none -z-10">
            <div
                class="absolute inset-0 bg-gradient-to-r from-[#D6C8AD] to-[#8F724F] blur-[120px] rounded-full mix-blend-multiply dark:mix-blend-screen">
            </div>
        </div>

        <section class="flex flex-col items-center relative z-10 w-full">
            
            <!-- Avatar Profil -->
            <div data-aos="zoom-in" data-aos-duration="1000"
                class="w-24 h-24 md:w-32 md:h-32 rounded-full overflow-hidden mb-8 border-4 border-white dark:border-zinc-800 shadow-xl shadow-cream-accent/20 mx-auto relative z-20">
                <img src="./images/foto.png" alt="Foto Profil"
                    class="w-full h-full object-cover object-top grayscale hover:grayscale-0 transition-all duration-700">
            </div>

            <!-- Premium Typography Headline -->
            <h1 data-aos="fade-up" data-aos-duration="1000"
                class="text-4xl sm:text-6xl md:text-8xl font-black tracking-tighter mb-6 max-w-4xl mx-auto text-cream-dark dark:text-cream-bg leading-[1.1]">
                Hi, I am a <br />
                <span class="font-serif italic font-normal text-cream-accent">Digital Innovator.</span>
            </h1>

            <!-- Typewriter -->
            <p data-aos="fade-up" data-aos-duration="1000" data-aos-delay="200"
                class="text-base md:text-xl text-cream-muted dark:text-zinc-400 max-w-2xl font-medium leading-relaxed mb-12 h-16 md:h-8">
                <span id="typewriter"></span><span class="cursor-blink text-cream-accent font-bold">|</span>
            </p>

            <!-- CTA Buttons -->
            <div data-aos="fade-up" data-aos-duration="1000" data-aos-delay="400"
                class="flex flex-col sm:flex-row items-center justify-center gap-4 w-full">
                <a href="projects.html"
                    class="w-full sm:w-auto px-8 py-4 bg-cream-dark dark:bg-cream-bg hover:bg-black dark:hover:bg-white text-white dark:text-cream-dark rounded-xl font-bold flex items-center justify-center gap-2 transition-all hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(45,45,45,0.2)] dark:shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                    View Projects <i class="ph-bold ph-arrow-right"></i>
                </a>
                <a href="about.html"
                    class="w-full sm:w-auto px-8 py-4 bg-white dark:bg-zinc-900 border border-cream-border dark:border-white/10 hover:bg-cream-light dark:hover:bg-zinc-800 text-cream-dark dark:text-cream-bg rounded-xl font-bold flex items-center justify-center gap-2 transition-all hover:scale-105 active:scale-95 shadow-sm">
                    Discover More
                </a>
            </div>

        </section>
    </main>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: false, offset: 50, easing: 'ease-out-cubic' });

        const textToType = "Building digital ecosystems through AI integration and modern web technologies.";
        let index = 0; const speed = 40;
        function typeWriter() {
            if (index < textToType.length) {
                document.getElementById("typewriter").innerHTML += textToType.charAt(index);
                index++;
                setTimeout(typeWriter, speed);
            }
        }
        setTimeout(typeWriter, 1000);

        // Page Loader & Transition Logic
        window.addEventListener('load', () => {
            const loader = document.getElementById('page-loader');
            if(loader) loader.classList.add('hidden-loader');
        });

        document.querySelectorAll('a[href$=".html"]').forEach(link => {
            link.addEventListener('click', function(e) {
                if(this.target === '_blank') return;
                e.preventDefault();
                const target = this.href;
                const loader = document.getElementById('page-loader');
                if(loader) {
                    loader.classList.remove('hidden-loader');
                    setTimeout(() => { window.location.href = target; }, 400);
                } else {
                    window.location.href = target;
                }
            });
        });

        // Mobile Menu Logic
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileMenuIcon = document.getElementById('mobile-menu-icon');
        const mobileLinks = document.querySelectorAll('.mobile-link');

        function toggleMobileMenu() {
            const isMenuOpen = !mobileMenu.classList.contains('opacity-0');
            if (isMenuOpen) {
                mobileMenu.classList.add('opacity-0', 'invisible', '-translate-y-4');
                mobileMenuIcon.classList.replace('ph-x', 'ph-list');
            } else {
                mobileMenu.classList.remove('opacity-0', 'invisible', '-translate-y-4');
                mobileMenuIcon.classList.replace('ph-list', 'ph-x');
            }
        }

        mobileMenuBtn.addEventListener('click', toggleMobileMenu);

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            lightIcon.classList.remove('hidden');
        } else {
            darkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function () {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');

            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
    </script>
</body>
</html>
